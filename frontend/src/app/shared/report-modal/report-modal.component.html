<!-- Purpose: Template for the Report modal component. -->
<div class="modal-overlay" (click)="closeModal()">
    <div class="modal" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h2 class="modal-title">Report User</h2>
            <button class="close-btn" (click)="closeModal()" type="button">×</button>
        </div>

        <form class="modal-body" [formGroup]="form" (ngSubmit)="submitReport()">
            <p class="report-info">
                You are reporting <strong>{{ userName() }}</strong>.
                Please provide a detailed reason for this report.
            </p>

            <div class="form-group">
                <label class="form-label">Reason for Report</label>
                <textarea formControlName="reason" class="form-textarea"
                    placeholder="Describe the issue (inappropriate content, harassment, spam, etc.)" rows="5"
                    [disabled]="loading()">
                </textarea>
                @if (error()) {
                <p class="form-error">{{ error() }}</p>
                }
            </div>

            <div class="warning-box">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M10 0C4.48 0 0 4.48 0 10C0 15.52 4.48 20 10 20C15.52 20 20 15.52 20 10C20 4.48 15.52 0 10 0ZM11 15H9V13H11V15ZM11 11H9V5H11V11Z"
                        fill="currentColor" />
                </svg>
                <p>False reports may result in action against your account. Reports are reviewed by administrators.</p>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" type="button" (click)="closeModal()" [disabled]="loading()">
                    Cancel
                </button>
                <button class="btn btn-primary" type="submit" [disabled]="loading() || !canSubmit">
                    @if (!loading()) {
                    <span>Submit Report</span>
                    }
                    @if (loading()) {
                    <span class="flex items-center gap-2">
                        <span class="spinner"></span>
                        Submitting...
                    </span>
                    }
                </button>
            </div>
        </form>
    </div>
</div>
