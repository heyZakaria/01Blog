<article class="post-card">
    <!-- Post Header -->
    <div class="post-header">
        <div class="post-author-info">
            <a [routerLink]="['/profile', post.author?.id]" class="avatar">
                {{ getAuthorInitials() }}
            </a>
            <div class="post-meta">
                <a [routerLink]="['/profile', post.author?.id]" class="author-name">
                    {{ post.author?.name }}
                </a>
                <span class="post-date">{{ formatDate(post.createdAt) }}</span>
            </div>
        </div>
    </div>

    <!-- Post Content -->
    <div class="post-content">
        <h3 class="post-title">{{ post.title }}</h3>
        <p class="post-description">{{ post.description }}</p>

        <!-- Media Preview -->
        @if (post.mediaUrl) {
        <div class="post-media">
            @if (post.mediaType === 'IMAGE') {
            <img [src]="post.mediaUrl" [alt]="post.title" />
            }
            @if (post.mediaType === 'VIDEO') {
            <video [src]="post.mediaUrl" controls></video>
            }
        </div>
        }
    </div>

    <!-- Post Footer -->
    @if (showActions) {
    <div class="post-footer">
        <div class="post-stats">
            <button class="stat-button" [class.liked]="post.likedByCurrentUser" (click)="onLike()" type="button">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M10 17.5L8.825 16.45C4.4 12.475 1.5 9.875 1.5 6.75C1.5 4.15 3.525 2.125 6.125 2.125C7.6 2.125 9.025 2.8 10 3.875C10.975 2.8 12.4 2.125 13.875 2.125C16.475 2.125 18.5 4.15 18.5 6.75C18.5 9.875 15.6 12.475 11.175 16.45L10 17.5Z"
                        [attr.fill]="post.likedByCurrentUser ? 'currentColor' : 'none'" stroke="currentColor"
                        stroke-width="1.5" />
                </svg>
                <span>{{ post.likeCount }}</span>
            </button>

            <a [routerLink]="['/post', post.id]" class="stat-button">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M17.5 2.5H2.5C1.83696 2.5 1.20107 2.76339 0.732233 3.23223C0.263392 3.70107 0 4.33696 0 5V12.5C0 13.163 0.263392 13.7989 0.732233 14.2678C1.20107 14.7366 1.83696 15 2.5 15H5V18.75C5 18.8663 5.03806 18.9799 5.10899 19.0736C5.17992 19.1674 5.28029 19.2365 5.39515 19.2712C5.51001 19.3059 5.63349 19.3045 5.74754 19.2671C5.86159 19.2298 5.96042 19.1583 6.02875 19.0625L9.40375 14.375H17.5C18.163 14.375 18.7989 14.1116 19.2678 13.6428C19.7366 13.1739 20 12.538 20 11.875V5C20 4.33696 19.7366 3.70107 19.2678 3.23223C18.7989 2.76339 18.163 2.5 17.5 2.5Z"
                        fill="none" stroke="currentColor" stroke-width="1.5" />
                </svg>
                <span>{{ post.commentCount }}</span>
            </a>
        </div>
    </div>
    }
</article>
